name: Deploy docling-extractor

# Push to main -> SSH into the ADIP server (139.84.131.160) and rebuild the
# docling container from its own compose file at /opt/docling-extractor.
# The service is exposed on host port 8000, guarded by DOCLING_SERVICE_TOKEN
# (set in /opt/docling-extractor/.env on the server). Callers (getlegal on the
# old server) reach it at http://<DEPLOY_HOST>:8000.
#
# Migrated off the old shared /opt/deploy stack + self-hosted runner on
# 139.84.209.18 — this now matches the ADIP deploy pattern (appleboy/ssh-action).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-docling
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/docling-extractor
            git fetch origin main
            git reset --hard origin/main
            docker compose --env-file .env up -d --build
            docker image prune -f
            for i in $(seq 1 30); do
              if curl -sf -m 5 http://127.0.0.1:8000/health >/dev/null; then
                echo "Healthy at $(git rev-parse --short HEAD)"
                exit 0
              fi
              sleep 2
            done
            echo "!! docling failed health check after deploy" >&2
            docker logs --tail 50 docling-extractor >&2
            exit 1
